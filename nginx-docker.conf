# ─── Qumulo Replication Monitor — Nginx config for Docker deployment ──────────
# Use this instead of the standard config when running via Docker.
# The backend runs inside the container; nginx proxies to the mapped host port.
#
# docker-compose.yml maps container port 3006 → host port 3008, so nginx
# proxies to localhost:3008 (the Docker-mapped port) rather than 3006 directly.
#
# If you changed the host port in docker-compose.yml, update the upstream below.

upstream qumulo_monitor_docker {
    server 127.0.0.1:3008;
    keepalive 16;
}

server {
    listen 3008;
    server_name _;

    proxy_connect_timeout   30s;
    proxy_send_timeout      60s;
    proxy_read_timeout      60s;

    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    location /api/ {
        proxy_pass         http://qumulo_monitor_docker;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }

    location /health {
        proxy_pass http://qumulo_monitor_docker;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location / {
        proxy_pass         http://qumulo_monitor_docker;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }
}

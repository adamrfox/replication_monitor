# ─────────────────────────────────────────────────────────────────────────────
# Qumulo Replication Monitor — Nginx Configuration
#
# Services:
#   Frontend (React)  → port 3005  (served by backend in production, or Vite in dev)
#   Backend API       → port 3006  (Express)
#   HTTPS Proxy       → port 3007  (internal only, NOT exposed via nginx)
#
# This config exposes the app on port 3008 (HTTP) with all API calls proxied
# to the backend. Adjust the server_name and port as needed.
# ─────────────────────────────────────────────────────────────────────────────

upstream qumulo_monitor_backend {
    server 127.0.0.1:3006;
    keepalive 16;
}

server {
    listen 3008;
    server_name _;          # Replace with your hostname if needed

    # Increase timeouts for long-polling
    proxy_connect_timeout   30s;
    proxy_send_timeout      60s;
    proxy_read_timeout      60s;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # ── API routes → backend ────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://qumulo_monitor_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }

    # ── Health check ────────────────────────────────────────────────────────
    location /health {
        proxy_pass http://qumulo_monitor_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ── Static frontend assets ──────────────────────────────────────────────
    # In production the backend serves the built React app.
    # In dev, change this to proxy to http://127.0.0.1:3005 instead.
    location / {
        proxy_pass         http://qumulo_monitor_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # SPA support: fall back to index.html
        proxy_intercept_errors on;
        error_page 404 = @fallback;
    }

    location @fallback {
        proxy_pass http://qumulo_monitor_backend;
    }

    # Block direct access to internal proxy (belt-and-suspenders)
    location /proxy {
        return 403;
    }
}


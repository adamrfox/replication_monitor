# ─── Qumulo Replication Monitor — Docker Compose ─────────────────────────────
# Usage:
#   docker compose up -d          # start
#   docker compose down           # stop
#   docker compose logs -f        # follow logs
#   docker compose pull && docker compose up -d  # upgrade

services:
  qumulo-monitor:
    build: .
    image: qumulo-monitor:latest
    container_name: qumulo-monitor
    restart: unless-stopped

    ports:
      # Host port : Container port
      # Change the left side to use a different host port (e.g. 8080:3006)
      - "3008:3006"

    volumes:
      # Persistent SQLite database — survives container restarts and upgrades
      - qumulo-monitor-data:/data

    environment:
      # Required: set a stable secret so sessions survive restarts
      JWT_SECRET: "change-this-to-a-random-secret-in-production"

      # Optional overrides (defaults shown)
      # BACKEND_PORT: "3006"
      # PROXY_PORT: "3007"
      # DB_PATH: "/data/qumulo-monitor.db"
      # FRONTEND_ORIGIN: "*"
      # NODE_ENV: "production"

    # Internal network only — proxy (3007) is never exposed externally
    # The backend (3006) is exposed via the port mapping above

    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3006/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  qumulo-monitor-data:
    driver: local
